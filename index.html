<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Schedule | AI Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto glass rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white p-6 md:p-12 min-h-[800px] flex flex-col">
        
        <div class="flex justify-between items-center mb-16 bg-slate-900 p-8 rounded-[2.5rem] shadow-xl text-white">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/40">
                    <span class="text-3xl">⚡</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter italic">Easy<span class="text-indigo-400">schedule</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-slate-400 opacity-80">AI Optimization Engine</p>
                </div>
            </div>
        </div>

        <div class="flex-grow">
            <div id="step1" class="step-content active">
                <div class="max-w-2xl">
                    <h2 class="text-6xl font-black text-slate-900 mb-6 tracking-tight leading-none">Define your <span class="text-indigo-600 underline decoration-indigo-200">week.</span></h2>
                    <p class="text-slate-500 font-medium mb-10">Set availability from 06:00 to 06:00 (Next Day).</p>
                </div>
                <div id="days-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>

            <div id="step2" class="step-content">
                <h2 class="text-6xl font-black text-slate-900 mb-10 tracking-tight">Fixed <span class="text-indigo-600">Anchors.</span></h2>
                <div id="anchors-list" class="space-y-4 max-w-4xl">
                    <button onclick="addAnchor()" class="w-full py-6 border-4 border-dashed border-indigo-100 rounded-[2rem] text-indigo-500 font-black text-lg hover:bg-indigo-50 transition-all">+ Add Fixed Event</button>
                </div>
            </div>

            <div id="step3" class="step-content">
                <h2 class="text-6xl font-black text-slate-900 mb-10 tracking-tight">Flexible <span class="text-indigo-600">Tasks.</span></h2>
                <div id="tasks-list" class="space-y-4 max-w-4xl">
                    <button id="addTaskBtn" onclick="addTask()" class="w-full py-6 border-4 border-dashed border-slate-100 rounded-[2rem] text-slate-400 font-black text-lg hover:bg-slate-50 transition-all">+ Add Flexible Task</button>
                </div>
            </div>

            <div id="step4" class="step-content">
                <h2 class="text-6xl font-black text-indigo-600 mb-12 tracking-tight uppercase">Optimized Weekly View</h2>
                <div id="summary-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center pt-10 border-t border-slate-100 mt-16 gap-8">
            <div id="dots" class="flex gap-4">
                <div class="w-16 h-2 bg-indigo-600 rounded-full"></div>
                <div class="w-16 h-2 bg-slate-200 rounded-full"></div>
                <div class="w-16 h-2 bg-slate-200 rounded-full"></div>
                <div class="w-16 h-2 bg-slate-200 rounded-full"></div>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <button id="prevBtn" onclick="prevStep()" class="hidden px-10 py-6 bg-white border border-slate-200 text-slate-600 rounded-[2rem] font-black hover:bg-slate-50 transition-all uppercase tracking-widest text-sm italic">Back</button>
                <button id="nextBtn" onclick="nextStep()" class="flex-grow md:flex-grow-0 px-20 py-6 bg-slate-900 text-white rounded-[2rem] font-black hover:bg-indigo-600 transition-all uppercase tracking-widest text-sm">Continue</button>
                <button id="resetBtn" onclick="location.reload()" class="hidden px-10 py-6 bg-rose-500 text-white rounded-[2rem] font-black hover:bg-rose-600 transition-all uppercase tracking-widest text-sm italic">Start Over</button>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        let config = {};

        function formatT(v) {
            let h = (6 + Math.floor(v / 2)) % 24;
            let m = (v % 2 === 0) ? '00' : '30';
            return h.toString().padStart(2, '0') + ':' + m;
        }

        function genOpts(s = 0, e = 48) {
            let o = '';
            for (let i = s; i <= e; i++) o += `<option value="${i}">${formatT(i)}</option>`;
            return o;
        }

        function init() {
            const cont = document.getElementById('days-container');
            days.forEach((day, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-black text-slate-800 tracking-tight">${day}</span>
                        <input type="checkbox" id="c-${i}" checked class="w-6 h-6 rounded-lg accent-indigo-600">
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <select id="s-${i}" onchange="updateDayEndOpts(this)" class="w-full p-3 bg-slate-50 rounded-xl font-bold">${genOpts(0, 47)}</select>
                            <select id="e-${i}" class="w-full p-3 bg-slate-50 rounded-xl font-bold">${genOpts(1, 48)}</select>
                        </div>
                        <select id="p-${i}" class="w-full p-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-xs">
                            <option value="1">Standard (30m Gap)</option>
                            <option value="2">Relaxed (1h Gap)</option>
                            <option value="0">Turbo (No Gaps)</option>
                        </select>
                    </div>`;
                cont.appendChild(div);
                document.getElementById(`s-${i}`).value = 0;
                updateDayEndOpts(document.getElementById(`s-${i}`));
                document.getElementById(`e-${i}`).value = 32;
            });
        }

        function updateDayEndOpts(startSelect) {
            const endSelect = startSelect.parentElement.querySelector('select[id^="e-"]');
            const startVal = parseInt(startSelect.value);
            const currentEnd = parseInt(endSelect.value);
            endSelect.innerHTML = genOpts(startVal + 1, 48);
            if (currentEnd > startVal) endSelect.value = currentEnd;
        }

        function updateAnchorEndOpts(startSelect) {
            const endSelect = startSelect.parentElement.querySelector('.end');
            const dayIdx = startSelect.closest('.anchor-item').querySelector('.day').value;
            const startVal = parseInt(startSelect.value);
            const currentEnd = parseInt(endSelect.value);
            endSelect.innerHTML = genOpts(startVal + 1, config[dayIdx].end);
            if (currentEnd > startVal) endSelect.value = currentEnd;
        }

        function syncAnchorTimes(daySelect) {
            const dayIdx = daySelect.value;
            const startSelect = daySelect.parentElement.querySelector('.start');
            startSelect.innerHTML = genOpts(config[dayIdx].start, config[dayIdx].end - 1);
            updateAnchorEndOpts(startSelect);
        }

        function addAnchor() {
            const activeDayIndices = Object.keys(config).filter(k => config[k].active);
            if (activeDayIndices.length === 0) return alert("Enable a day in Step 1 first");
            const d = document.createElement('div');
            d.className = 'flex flex-wrap gap-4 bg-white p-6 rounded-[2rem] border-2 border-slate-50 items-center shadow-sm anchor-item';
            let dayOptions = activeDayIndices.map(i => `<option value="${i}">${days[i]}</option>`).join('');
            d.innerHTML = `
                <input type="text" placeholder="Event Name" class="flex-grow p-2 font-black text-xl outline-none name">
                <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl">
                    <select class="day font-bold text-xs bg-transparent outline-none" onchange="syncAnchorTimes(this)">${dayOptions}</select>
                    <div class="w-[1px] bg-slate-200"></div>
                    <select class="start font-bold text-xs bg-transparent outline-none" onchange="updateAnchorEndOpts(this)"></select>
                    <span class="text-slate-300">-</span>
                    <select class="end font-bold text-xs bg-transparent outline-none"></select>
                </div>
                <button onclick="this.parentElement.remove()" class="w-10 h-10 bg-rose-50 text-rose-500 rounded-full font-bold">✕</button>`;
            document.getElementById('anchors-list').insertBefore(d, document.getElementById('anchors-list').firstChild);
            syncAnchorTimes(d.querySelector('.day'));
        }

        function addTask() {
            const activeDayIndices = Object.keys(config).filter(k => config[k].active);
            if (activeDayIndices.length === 0) return;
            const d = document.createElement('div');
            d.className = 'bg-white p-6 rounded-[2rem] border-2 border-slate-50 flex gap-4 items-center shadow-sm task-item';
            let dayOptions = activeDayIndices.map(i => `<option value="${i}">${days[i]}</option>`).join('');
            d.innerHTML = `
                <input type="text" placeholder="Task Name" class="flex-grow p-2 font-black text-xl outline-none name">
                <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl">
                    <select class="day font-bold text-xs bg-transparent outline-none" onchange="syncTaskDur(this)">${dayOptions}</select>
                    <div class="w-[1px] bg-slate-200"></div>
                    <select class="dur font-bold text-xs bg-transparent outline-none"></select>
                </div>
                <button onclick="this.parentElement.remove()" class="w-10 h-10 bg-rose-50 text-rose-500 rounded-full font-bold">✕</button>`;
            document.getElementById('tasks-list').insertBefore(d, document.getElementById('addTaskBtn'));
            syncTaskDur(d.querySelector('.day'));
        }

        function syncTaskDur(daySelect) {
            const durSelect = daySelect.parentElement.querySelector('.dur');
            const dayConf = config[daySelect.value];
            let opts = '';
            for(let i=1; i<=(dayConf.end - dayConf.start); i++) opts += `<option value="${i}">${i*30}m</option>`;
            durSelect.innerHTML = opts;
        }

        function prevStep() {
            if (currentStep > 1) {
                document.getElementById(`step${currentStep}`).style.display = 'none';
                currentStep--;
                document.getElementById(`step${currentStep}`).style.display = 'block';
                updateNav();
            }
        }

        function nextStep() {
            if (currentStep < 4) {
                save();
                document.getElementById(`step${currentStep}`).style.display = 'none';
                currentStep++;
                document.getElementById(`step${currentStep}`).style.display = 'block';
                updateNav();
                if (currentStep === 4) render();
            }
        }

        function updateNav() {
            const dots = document.getElementById('dots').children;
            const nextBtn = document.getElementById('nextBtn');
            const prevBtn = document.getElementById('prevBtn');
            const resetBtn = document.getElementById('resetBtn');
            for (let i = 0; i < 4; i++) dots[i].className = `w-16 h-2 rounded-full ${i < currentStep ? 'bg-indigo-600' : 'bg-slate-200'}`;
            prevBtn.style.display = currentStep > 1 ? 'block' : 'none';
            nextBtn.style.display = currentStep === 4 ? 'none' : 'block';
            resetBtn.style.display = currentStep === 4 ? 'block' : 'none';
        }

        function save() {
            days.forEach((_, i) => {
                if (document.getElementById(`s-${i}`)) {
                    config[i] = {
                        active: document.getElementById(`c-${i}`).checked,
                        start: parseInt(document.getElementById(`s-${i}`).value),
                        end: parseInt(document.getElementById(`e-${i}`).value),
                        pace: parseInt(document.getElementById(`p-${i}`).value)
                    };
                }
            });
        }

        function render() {
            const cont = document.getElementById('summary-container');
            cont.innerHTML = '';
            days.forEach((day, idx) => {
                if (!config[idx] || !config[idx].active) return;
                let cur = config[idx].start;
                const items = [], errs = [];
                const anchors = Array.from(document.querySelectorAll('.anchor-item')).filter(a => a.querySelector('.day').value == idx).map(a => ({
                    n: a.querySelector('.name').value || 'Anchor',
                    s: parseInt(a.querySelector('.start').value),
                    e: parseInt(a.querySelector('.end').value),
                    t: 'A'
                })).sort((a, b) => a.s - b.s);

                const tasks = Array.from(document.querySelectorAll('.task-item')).filter(t => t.querySelector('.day').value == idx).map(t => ({
                    n: t.querySelector('.name').value || 'Task',
                    d: parseInt(t.querySelector('.dur').value),
                    t: 'T'
                }));

                tasks.forEach(task => {
                    let ok = false;
                    while (cur + task.d <= config[idx].end) {
                        let hitAnchor = anchors.find(a => a.s < (cur + task.d) && a.e > cur);
                        if (!hitAnchor) {
                            items.push({ n: task.n, s: cur, e: cur + task.d, t: 'T' });
                            cur += task.d + config[idx].pace;
                            ok = true;
                            break;
                        } else {
                            cur = hitAnchor.e + config[idx].pace;
                        }
                    }
                    if (!ok) errs.push(task.n);
                });

                const card = document.createElement('div');
                card.className = 'bg-white p-8 rounded-[3rem] shadow-xl border border-slate-50 flex flex-col gap-4';
                card.innerHTML = `<h3 class="font-black text-2xl text-slate-800 mb-2 underline decoration-indigo-200">${day}</h3>` +
                    [...items, ...anchors].sort((a, b) => a.s - b.s).map(i => `
                    <div class="flex flex-col gap-1 p-5 rounded-[1.5rem] ${i.t === 'A' ? 'bg-slate-100 border text-slate-700' : 'bg-indigo-600 text-white shadow-lg'}">
                        <span class="text-[9px] font-black uppercase opacity-50 tracking-tighter">${i.t === 'A' ? 'Fixed Anchor' : 'Optimized Slot'}</span>
                        <div class="flex justify-between items-center italic">
                            <span class="font-bold text-sm leading-tight">${i.n}</span>
                            <span class="font-black text-xs whitespace-nowrap ml-2">${formatT(i.s)} - ${formatT(i.e)}</span>
                        </div>
                    </div>`).join('') +
                    errs.map(e => `<div class="p-4 bg-rose-50 text-rose-600 text-[10px] font-black rounded-2xl mt-2 border border-rose-100">✕ Overflow: ${e}</div>`).join('');
                cont.appendChild(card);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
