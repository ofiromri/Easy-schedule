<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Schedule | AI Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto glass rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] border border-white p-6 md:p-12 min-h-[800px] flex flex-col">
        
        <div class="flex justify-between items-center mb-16 bg-slate-900 p-8 rounded-[2.5rem] shadow-xl text-white">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/40 animate-pulse">
                    <span class="text-3xl">⚡</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter italic">Easy<span class="text-indigo-400">schedule</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-slate-400 opacity-80">AI Workflow Engine v2.0</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-3 bg-slate-800 px-5 py-2.5 rounded-full border border-slate-700">
                <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-emerald-400">Optimization Active</span>
            </div>
        </div>

        <div class="flex-grow">
            <div id="step1" class="step-content active">
                <div class="max-w-2xl">
                    <h2 class="text-6xl font-black text-slate-900 mb-6 tracking-tight leading-none">Define your <span class="text-indigo-600 underline decoration-indigo-200">week.</span></h2>
                    <p class="text-slate-500 font-medium mb-10">Set your availability and preferred pacing for the optimization engine.</p>
                </div>
                <div id="days-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>

            <div id="step2" class="step-content">
                <h2 class="text-6xl font-black text-slate-900 mb-10 tracking-tight">Fixed <span class="text-indigo-600">Anchors.</span></h2>
                <div id="anchors-list" class="space-y-4 max-w-4xl">
                    <button onclick="addAnchor()" class="w-full py-6 border-4 border-dashed border-indigo-100 rounded-[2rem] text-indigo-500 font-black text-lg hover:bg-indigo-50 transition-all hover:border-indigo-300">+ Click to Add Fixed Event</button>
                </div>
            </div>

            <div id="step3" class="step-content">
                <h2 class="text-6xl font-black text-slate-900 mb-10 tracking-tight">Flexible <span class="text-indigo-600">Tasks.</span></h2>
                <div id="tasks-list" class="space-y-4 max-w-4xl">
                    <button id="addTaskBtn" onclick="addTask()" class="w-full py-6 border-4 border-dashed border-slate-100 rounded-[2rem] text-slate-400 font-black text-lg hover:bg-slate-50 transition-all hover:border-slate-300">+ Click to Add Flexible Task</button>
                </div>
            </div>

            <div id="step4" class="step-content">
                <h2 class="text-6xl font-black text-indigo-600 mb-12 tracking-tight">Optimized Schedule</h2>
                <div id="summary-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center pt-10 border-t border-slate-100 mt-16 gap-8">
            <div id="dots" class="flex gap-4">
                <div class="w-16 h-2 bg-indigo-600 rounded-full shadow-sm shadow-indigo-200"></div>
                <div class="w-16 h-2 bg-slate-200 rounded-full"></div>
                <div class="w-16 h-2 bg-slate-200 rounded-full"></div>
                <div class="w-16 h-2 bg-slate-200 rounded-full"></div>
            </div>
            <button id="nextBtn" onclick="nextStep()" class="w-full md:w-auto px-20 py-6 bg-slate-900 text-white rounded-[2rem] font-black hover:bg-indigo-600 transition-all hover:scale-105 active:scale-95 shadow-2xl shadow-slate-200 uppercase tracking-widest text-sm">Continue</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        let config = {};

        function formatT(v) {
            let h = (6 + Math.floor(v / 2)) % 24;
            let m = (v % 2 === 0) ? '00' : '30';
            return h.toString().padStart(2, '0') + ':' + m;
        }

        function genOpts(s = 0, e = 48) {
            let o = '';
            for (let i = s; i <= e; i++) o += `<option value="${i}">${formatT(i)}</option>`;
            return o;
        }

        function init() {
            const cont = document.getElementById('days-container');
            days.forEach((day, i) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-md transition-shadow';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="font-black text-slate-800 tracking-tight">${day}</span>
                        <input type="checkbox" id="c-${i}" checked class="w-6 h-6 rounded-lg accent-indigo-600">
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                            <span>Start</span><span>End</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <select id="s-${i}" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none outline-none ring-2 ring-transparent focus:ring-indigo-500">${genOpts(0, 36)}</select>
                            <select id="e-${i}" class="w-full p-3 bg-slate-50 rounded-xl font-bold border-none outline-none ring-2 ring-transparent focus:ring-indigo-500">${genOpts(4, 48)}</select>
                        </div>
                        <select id="p-${i}" class="w-full p-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-xs border-none outline-none">
                            <option value="1">Standard Pace (30m)</option>
                            <option value="2">Slow Pace (1h)</option>
                            <option value="0">Turbo (No Gaps)</option>
                        </select>
                    </div>`;
                cont.appendChild(div);
            });
        }

        function save() {
            days.forEach((_, i) => {
                if (document.getElementById(`s-${i}`)) {
                    config[i] = {
                        active: document.getElementById(`c-${i}`).checked,
                        start: parseInt(document.getElementById(`s-${i}`).value),
                        end: parseInt(document.getElementById(`e-${i}`).value),
                        pace: parseInt(document.getElementById(`p-${i}`).value)
                    };
                }
            });
        }

        function addAnchor() {
            const d = document.createElement('div');
            d.className = 'flex flex-wrap gap-4 bg-white p-6 rounded-[2rem] border-2 border-slate-50 items-center shadow-sm anchor-item';
            d.innerHTML = `
                <input type="text" placeholder="e.g. Work/Class" class="flex-grow p-2 font-black text-xl outline-none name text-slate-800">
                <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl">
                    <select class="day font-bold text-xs bg-transparent outline-none">${days.map((n, i) => `<option value="${i}">${n}</option>`).join('')}</select>
                    <div class="w-[1px] bg-slate-200"></div>
                    <select class="start font-bold text-xs bg-transparent outline-none">${genOpts(0, 48)}</select>
                    <span class="text-slate-300">-</span>
                    <select class="end font-bold text-xs bg-transparent outline-none">${genOpts(0, 48)}</select>
                </div>
                <button onclick="this.parentElement.remove()" class="w-10 h-10 flex items-center justify-center bg-rose-50 text-rose-500 rounded-full font-bold hover:bg-rose-100 transition-colors">✕</button>`;
            document.getElementById('anchors-list').insertBefore(d, document.getElementById('anchors-list').firstChild);
        }

        function addTask() {
            const d = document.createElement('div');
            d.className = 'bg-white p-6 rounded-[2rem] border-2 border-slate-50 flex gap-4 items-center shadow-sm task-item';
            d.innerHTML = `
                <input type="text" placeholder="e.g. Gym/Study" class="flex-grow p-2 font-black text-xl outline-none name">
                <div class="flex gap-2 bg-slate-50 p-2 rounded-2xl">
                    <select class="day font-bold text-xs bg-transparent outline-none">${days.map((n, i) => `<option value="${i}">${n}</option>`).join('')}</select>
                    <div class="w-[1px] bg-slate-200"></div>
                    <select class="dur font-bold text-xs bg-transparent outline-none">
                        <option value="1">30m</option><option value="2">1h</option><option value="4">2h</option>
                    </select>
                </div>
                <button onclick="this.parentElement.remove()" class="w-10 h-10 flex items-center justify-center bg-rose-50 text-rose-500 rounded-full font-bold hover:bg-rose-100 transition-colors">✕</button>`;
            document.getElementById('tasks-list').insertBefore(d, document.getElementById('addTaskBtn'));
        }

        function nextStep() {
            if (currentStep < 4) {
                save();
                document.getElementById(`step${currentStep}`).style.display = 'none';
                currentStep++;
                document.getElementById(`step${currentStep}`).style.display = 'block';
                const dots = document.getElementById('dots').children;
                for (let i = 0; i < 4; i++) dots[i].className = `w-16 h-2 rounded-full transition-all ${i < currentStep ? 'bg-indigo-600 shadow-md shadow-indigo-200' : 'bg-slate-200'}`;
                if (currentStep === 4) {
                    render();
                    document.getElementById('nextBtn').innerText = 'Start Over';
                    document.getElementById('nextBtn').onclick = () => location.reload();
                }
            }
        }

        function render() {
            const cont = document.getElementById('summary-container');
            cont.innerHTML = '';
            days.forEach((day, idx) => {
                if (!config[idx] || !config[idx].active) return;
                let cur = config[idx].start;
                const items = [], errs = [];
                const anchors = Array.from(document.querySelectorAll('.anchor-item')).filter(a => a.querySelector('.day').value == idx).map(a => ({
                    n: a.querySelector('.name').value || 'Anchor',
                    s: parseInt(a.querySelector('.start').value),
                    e: parseInt(a.querySelector('.end').value),
                    t: 'A'
                })).sort((a, b) => a.s - b.s);

                const tasks = Array.from(document.querySelectorAll('.task-item')).filter(t => t.querySelector('.day').value == idx).map(t => ({
                    n: t.querySelector('.name').value || 'Task',
                    d: parseInt(t.querySelector('.dur').value),
                    t: 'T'
                }));

                tasks.forEach(task => {
                    let ok = false;
                    while (cur + task.d <= config[idx].end) {
                        let hit = anchors.find(a => a.s < (cur + task.d) && a.e > cur);
                        if (!hit) {
                            let nA = anchors.find(a => a.s >= cur);
                            if (nA && (cur + task.d + config[idx].pace > nA.s)) {
                                cur = nA.e + config[idx].pace;
                                continue;
                            }
                            items.push({ n: task.n, s: cur, e: cur + task.d, t: 'T' });
                            cur += task.d + config[idx].pace;
                            ok = true;
                            break;
                        } else {
                            cur = hit.e + config[idx].pace;
                        }
                    }
                    if (!ok) errs.push(task.n);
                });

                const card = document.createElement('div');
                card.className = 'bg-white p-8 rounded-[3rem] shadow-xl border border-slate-50 flex flex-col gap-4';
                card.innerHTML = `<h3 class="font-black text-2xl text-slate-800 mb-2">${day}</h3>` +
                    [...items, ...anchors].sort((a, b) => a.s - b.s).map(i => `
                    <div class="flex flex-col gap-1 p-5 rounded-[1.5rem] ${i.t === 'A' ? 'bg-slate-50 border border-slate-100 text-slate-600' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-100'}">
                        <span class="text-[10px] font-black uppercase tracking-widest opacity-60">${i.t === 'A' ? 'Fixed Anchor' : 'Flexible Task'}</span>
                        <div class="flex justify-between items-center italic">
                            <span class="font-bold text-sm leading-tight">${i.n}</span>
                            <span class="font-black text-xs">${formatT(i.s)} - ${formatT(i.e)}</span>
                        </div>
                    </div>`).join('') +
                    errs.map(e => `<div class="p-4 bg-rose-50 text-rose-600 text-[10px] font-black rounded-2xl mt-2 flex items-center gap-2"><span>⚠️</span> Capacity Overflow: ${e}</div>`).join('');
                cont.appendChild(card);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
