<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Schedule - AI Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; direction: ltr; }
        .step-content { display: none; }
        .step-content.active { display: block; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-7xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-8 min-h-[750px] flex flex-col">
        <div class="flex justify-between items-center mb-12 bg-slate-900 p-6 rounded-3xl text-white">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20"><span class="text-2xl">⚡</span></div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">Easy <span class="text-indigo-400">schedule</span></h1>
                    <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400">Weekly Optimization Engine</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-emerald-400">System Ready</span>
            </div>
        </div>
        <div id="step1" class="step-content active flex-grow">
            <h2 class="text-5xl font-black text-slate-900 mb-4 tracking-tight">Define your week.</h2>
            <div id="days-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-10"></div>
        </div>
        <div id="step2" class="step-content flex-grow">
            <h2 class="text-5xl font-black text-slate-900 mb-4 tracking-tight">Fixed Anchors.</h2>
            <div id="anchors-list" class="space-y-4 max-w-3xl mt-10">
                <button onclick="addAnchor()" class="w-full py-5 border-2 border-dashed border-indigo-200 rounded-3xl text-indigo-600 font-bold hover:bg-indigo-50">+ Add Anchor</button>
            </div>
        </div>
        <div id="step3" class="step-content flex-grow">
            <h2 class="text-5xl font-black text-slate-900 mb-4 tracking-tight">Flexible Tasks.</h2>
            <div id="tasks-list" class="space-y-4 max-w-3xl mt-10">
                <button id="addTaskBtn" onclick="addTask()" class="w-full py-5 border-2 border-dashed border-slate-200 rounded-3xl text-slate-500 font-bold hover:bg-slate-50">+ Add Task</button>
            </div>
        </div>
        <div id="step4" class="step-content flex-grow">
            <h2 class="text-5xl font-black text-indigo-600 mb-4 tracking-tight">Optimized Schedule</h2>
            <div id="summary-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-10"></div>
        </div>
        <div class="flex justify-between items-center pt-8 border-t border-slate-100 mt-12">
            <div id="dots" class="flex gap-3">
                <div class="w-12 h-3 bg-indigo-600 rounded-full"></div>
                <div class="w-12 h-3 bg-slate-200 rounded-full"></div>
                <div class="w-12 h-3 bg-slate-200 rounded-full"></div>
                <div class="w-12 h-3 bg-slate-200 rounded-full"></div>
            </div>
            <button id="nextBtn" onclick="nextStep()" class="px-16 py-5 bg-slate-900 text-white rounded-[2rem] font-black hover:bg-indigo-600 transition-all uppercase tracking-widest text-sm">Next Step</button>
        </div>
    </div>
    <script>
        let currentStep = 1;
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        let config = {};
        function formatT(v) { let h = (6 + Math.floor(v/2)) % 24; let m = (v%2===0)?'00':'30'; return h.toString().padStart(2,'0')+':'+m; }
        function genOpts(s=0, e=48) { let o=''; for(let i=s;i<=e;i++) o+=`<option value="${i}">${formatT(i)}</option>`; return o; }
        function init(){
            const cont = document.getElementById('days-container');
            days.forEach((day,i) => {
                const div = document.createElement('div');
                div.className = 'bg-slate-50 p-6 rounded-[2rem] border';
                div.innerHTML = `<div class="flex justify-between mb-4"><span class="font-bold">${day}</span><input type="checkbox" id="c-${i}" checked></div>
                <div class="grid grid-cols-2 gap-2">
                <select id="s-${i}" class="p-2 border rounded-xl text-xs font-bold">${genOpts(0,36)}</select>
                <select id="e-${i}" class="p-2 border rounded-xl text-xs font-bold">${genOpts(4,48)}</select>
                </div><select id="p-${i}" class="w-full mt-4 p-2 bg-indigo-50 text-indigo-700 rounded-xl text-[10px] font-black"><option value="1">Standard (30m)</option><option value="2">Relaxed (1h)</option><option value="0">Intensive</option></select>`;
                cont.appendChild(div);
            });
        }
        function save(){ days.forEach((_,i)=>{ if(document.getElementById(`s-${i}`)) config[i]={active:document.getElementById(`c-${i}`).checked, start:parseInt(document.getElementById(`s-${i}`).value), end:parseInt(document.getElementById(`e-${i}`).value), pace:parseInt(document.getElementById(`p-${i}`).value)}; }); }
        function addAnchor(){
            const d = document.createElement('div'); d.className = 'flex gap-2 bg-white p-4 rounded-2xl border items-center anchor-item';
            d.innerHTML = `<input type="text" placeholder="Anchor" class="flex-grow font-bold outline-none name"><select class="day text-[10px] font-bold">${days.map((n,i)=>`<option value="${i}">${n}</option>`).join('')}</select><select class="start text-[10px]">${genOpts(0,48)}</select><select class="end text-[10px]">${genOpts(0,48)}</select><button onclick="this.parentElement.remove()">✕</button>`;
            document.getElementById('anchors-list').insertBefore(d, document.getElementById('anchors-list').firstChild);
        }
        function addTask(){
            const d = document.createElement('div'); d.className = 'bg-white p-4 rounded-2xl border flex gap-3 items-center task-item';
            d.innerHTML = `<input type="text" placeholder="Task Name" class="flex-grow font-bold outline-none name"><select class="day text-[10px] font-bold">${days.map((n,i)=>`<option value="${i}">${n}</option>`).join('')}</select><select class="dur text-[10px] font-bold"><option value="1">30m</option><option value="2">1h</option><option value="4">2h</option></select><button onclick="this.parentElement.remove()">✕</button>`;
            document.getElementById('tasks-list').insertBefore(d, document.getElementById('addTaskBtn'));
        }
        function nextStep(){
            if(currentStep < 4){
                save(); document.getElementById(`step${currentStep}`).style.display='none';
                currentStep++; document.getElementById(`step${currentStep}`).style.display='block';
                const dots = document.getElementById('dots').children;
                for(let i=0;i<4;i++) dots[i].className = `w-12 h-3 rounded-full ${i < currentStep ? 'bg-indigo-600' : 'bg-slate-200'}`;
                if(currentStep===4) render();
            }
        }
        function render(){
            const cont = document.getElementById('summary-container'); cont.innerHTML = '';
            days.forEach((day,idx)=>{
                if(!config[idx] || !config[idx].active) return;
                let cur = config[idx].start; const items = [], errs = [];
                const anchors = Array.from(document.querySelectorAll('.anchor-item')).filter(a=>a.querySelector('.day').value == idx).map(a=>({n:a.querySelector('.name').value||'Anchor', s:parseInt(a.querySelector('.start').value), e:parseInt(a.querySelector('.end').value), t:'A'})).sort((a,b)=>a.s-b.s);
                const tasks = Array.from(document.querySelectorAll('.task-item')).filter(t=>t.querySelector('.day').value == idx).map(t=>({n:t.querySelector('.name').value||'Task', d:parseInt(t.querySelector('.dur').value), t:'T'}));
                tasks.forEach(task => {
                    let ok = false; while(cur + task.d <= config[idx].end){
                        let hit = anchors.find(a=>a.s < (cur+task.d) && a.e > cur);
                        if(!hit){
                            let nA = anchors.find(a=>a.s >= cur);
                            if(nA && (cur + task.d + config[idx].pace > nA.s)){ cur = nA.e + config[idx].pace; continue; }
                            items.push({n:task.n, s:cur, e:cur+task.d, t:'T'}); cur += task.d + config[idx].pace; ok=true; break;
                        } else { cur = hit.e + config[idx].pace; }
                    }
                    if(!ok) errs.push(task.n);
                });
                const card = document.createElement('div'); card.className = 'bg-slate-50 p-6 rounded-[2rem] border';
                card.innerHTML = `<h3 class="font-bold border-b pb-2 mb-4 text-xl">${day}</h3>` + [...items, ...anchors].sort((a,b)=>a.s-b.s).map(i=>`<div class="flex justify-between p-4 mb-2 rounded-2xl text-xs font-black ${i.t==='A'?'bg-white border text-slate-700':'bg-indigo-600 text-white'}"><span>${i.t==='A'?'📌 ':''}${i.n}</span><span>${formatT(i.s)}-${formatT(i.e)}</span></div>`).join('') + errs.map(e=>`<div class="p-4 bg-red-100 text-red-700 text-[10px] font-black rounded-2xl mt-2">✕ Space Overflow: ${e}</div>`).join('');
                cont.appendChild(card);
            });
        }
        window.onload = init;
    </script>
</body>
</html>
